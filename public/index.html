<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>voxout</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>voxout</h1>
          <p>Provider configuration and unified invocation console</p>
        </div>
        <button id="refresh" type="button">Refresh</button>
      </header>

      <section class="layout">
        <aside class="panel">
          <div class="panel-title">Providers</div>
          <div id="providers" class="provider-list"></div>
        </aside>

        <section class="panel detail">
          <form id="config-form" class="config-form">
            <div class="detail-head">
              <div>
                <div id="provider-name" class="provider-name">Select a provider</div>
                <div id="provider-capabilities" class="muted"></div>
              </div>
              <label class="switch">
                <input id="enabled" type="checkbox">
                <span>Enabled</span>
              </label>
            </div>
            <div id="fields" class="fields"></div>
            <div class="actions">
              <button type="submit">Save configuration</button>
              <span id="save-status" class="status"></span>
            </div>
          </form>

          <div class="invoke">
            <div class="panel-title">Invoke</div>
            <textarea id="invoke-input" spellcheck="false"></textarea>
            <div class="actions">
              <button id="invoke" type="button">Run</button>
              <span id="invoke-status" class="status"></span>
            </div>
            <pre id="invoke-output"></pre>
          </div>
        </section>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
